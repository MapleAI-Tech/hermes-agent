name: Sync Upstream

on:
  schedule:
    - cron: "18 2 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sync-upstream-main
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout fork
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Add upstream remote
        run: |
          git remote add upstream https://github.com/NousResearch/hermes-agent.git
          git fetch upstream --tags

      - name: Sync main with upstream
        id: sync_main
        run: |
          git checkout main
          if git merge --ff-only upstream/main 2>/dev/null; then
            echo "Fast-forward merge succeeded."
          else
            echo "Branches diverged, rebasing local commits onto upstream/main..."
            git rebase upstream/main
          fi
          git submodule update --init --recursive
          git push origin main
        shell: bash {0}

      - name: Sync tags from upstream
        run: |
          # Remove all existing tags on origin (from previous runs)
          git push origin --delete $(git tag -l) 2>/dev/null || true

          # Push all upstream tags as-is (historical versions)
          git push origin --tags

          # Find the latest upstream tag and re-point it to our main HEAD
          LATEST_TAG=$(git tag -l --sort=-creatordate | head -1)
          if [ -n "$LATEST_TAG" ]; then
            git tag -d "$LATEST_TAG" 2>/dev/null || true
            git tag "$LATEST_TAG" main
            git push origin "$LATEST_TAG" --force
            echo "Re-pointed latest tag '$LATEST_TAG' to fork main HEAD."
          fi
        shell: bash {0}
