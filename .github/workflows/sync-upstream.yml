name: Sync Upstream

on:
  schedule:
    - cron: "18 2 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sync-upstream-main
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout fork
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Add upstream remote
        run: |
          git remote remove upstream 2>/dev/null || true
          git remote add upstream https://github.com/NousResearch/hermes-agent.git
          git fetch upstream main:refs/remotes/upstream/main
        shell: bash {0}

      - name: Sync main with upstream
        id: sync_main
        run: |
          git checkout main
          if git merge --ff-only upstream/main 2>/dev/null; then
            echo "Fast-forward merge succeeded."
          else
            echo "Branches diverged, merging upstream/main to preserve fork commits..."
            git merge --no-edit upstream/main
          fi
          git submodule update --init --recursive
          git push origin main
        shell: bash {0}

      - name: Create MapleAI build tag
        run: |
          LATEST_UPSTREAM_TAG=$(git ls-remote --tags --refs upstream 'v*' | awk -F/ '{print $NF}' | sort -V | tail -1)
          if [ -z "$LATEST_UPSTREAM_TAG" ]; then
            echo "No upstream release tag found."
            exit 1
          fi

          MAPLEAI_TAG="mapleai-${LATEST_UPSTREAM_TAG}"
          echo "Creating MapleAI build tag: ${MAPLEAI_TAG}"

          if git ls-remote --exit-code --tags origin "refs/tags/${MAPLEAI_TAG}" >/dev/null 2>&1; then
            echo "Tag ${MAPLEAI_TAG} already exists on origin; leaving it unchanged."
            exit 0
          fi

          git tag "$MAPLEAI_TAG" HEAD
          git push origin "$MAPLEAI_TAG"
        shell: bash {0}
