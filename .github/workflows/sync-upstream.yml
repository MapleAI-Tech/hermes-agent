name: Sync Upstream

on:
  schedule:
    - cron: "18 2 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sync-upstream-main
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout fork
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Add upstream remote
        run: |
          git remote add upstream https://github.com/NousResearch/hermes-agent.git
          git fetch upstream --tags

      - name: Sync main with upstream
        id: sync_main
        run: |
          git checkout main
          if git merge --ff-only upstream/main 2>/dev/null; then
            echo "Fast-forward merge succeeded."
          else
            echo "Branches diverged, rebasing local commits onto upstream/main..."
            git rebase upstream/main
          fi
          git submodule update --init --recursive
          git push origin main
        shell: bash {0}

      - name: Sync tags from upstream
        run: |
          # Collect upstream tag names and re-point them to our main HEAD
          TAGS=$(git tag -l --sort=-creatordate)
          if [ -z "$TAGS" ]; then
            echo "No upstream tags found, skipping."
            exit 0
          fi

          SYNCED=0
          for tag in $TAGS; do
            # Delete local tag if it already exists
            git tag -d "$tag" 2>/dev/null || true
            # Create tag with same name pointing to our main HEAD
            git tag "$tag" main
            SYNCED=$((SYNCED + 1))
          done

          echo "Re-pointed $SYNCED tags to fork main HEAD."
          # Force push all tags (handles new + updated)
          git push origin --tags --force
        shell: bash {0}
